services:
  img_server:
    image: ghcr.io/pavolmisenko/img_server:latest
    container_name: img_server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - RUST_LOG=img_server=info
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
